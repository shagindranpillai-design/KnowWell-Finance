<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Know Well | Elite Finance</title>
    <style>
        body { background-color: #020617; color: #e2e8f0; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px; border-bottom: 1px solid #1e293b; background: #020617; position: sticky; top: 0; z-index: 40; }
        .logo { font-weight: 900; font-size: 22px; color: white; letter-spacing: -1px; }
        .gold { color: #fbbf24; }
        .container { padding: 20px; }
        
        /* News Cards */
        .card { background: #0f172a; border-radius: 25px; border: 1px solid #334155; overflow: hidden; margin-bottom: 25px; cursor: pointer; transition: transform 0.2s; }
        .card:active { transform: scale(0.98); }
        .img-box { width: 100%; height: 200px; object-fit: cover; background: #1e293b; border-bottom: 1px solid #334155; }
        .card-content { padding: 20px; }
        .label { color: #fbbf24; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
        h2 { color: white; margin: 5px 0; font-size: 20px; line-height: 1.3; }
        p { font-size: 13px; color: #94a3b8; line-height: 1.6; }

        /* Reader View & Action Bar */
        #reader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #020617; z-index: 1000; display: none; overflow-y: auto; }
        .reader-header { padding: 20px; position: sticky; top: 0; background: rgba(2, 6, 23, 0.95); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1e293b; }
        .back-btn { background: #fbbf24; color: black; border: none; padding: 10px 15px; border-radius: 12px; font-weight: 900; font-size: 11px; cursor: pointer; }
        
        .action-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .action-btn { flex: 1; background: #1e293b; color: #fbbf24; border: 1px solid #334155; padding: 12px; border-radius: 12px; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .action-btn:hover { background: #334155; }

        /* Auth Modal */
        #auth-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .auth-card { background: #0f172a; border: 1px solid #fbbf24; padding: 30px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; }
        .auth-input { width: 100%; padding: 15px; margin: 10px 0; background: #1e293b; border: 1px solid #334155; border-radius: 12px; color: white; box-sizing: border-box; }
        
        .btn-unlock { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #fbbf24; color: black; border: none; padding: 20px; border-radius: 20px; font-weight: 900; text-transform: uppercase; font-size: 12px; z-index: 50; cursor: pointer; }
.ticker-wrap {
    width: 100%;
    overflow: hidden;
    background-color: #0f172a;
    border-bottom: 1px solid #1e293b;
    padding: 10px 0;
}
.ticker {
    display: flex;
    white-space: nowrap;
    width: fit-content;
    animation: ticker-scroll 25s linear infinite;
}

.ticker-item {
    display: inline-block;
    padding: 0 30px;
    font-size: 11px;
    font-weight: bold;
    color: #94a3b8;
    text-transform: uppercase;
}

.ticker-price { color: #fbbf24; margin-left: 5px; }
.price-up { color: #22c55e; font-size: 9px; margin-left: 3px; }

@keyframes ticker-scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
}

    </style>
</head>
<body>

    <nav>
        <div class="logo">KNOW <span class="gold">WELL</span></div>
        <div style="font-size: 10px; background: #fbbf24; color: black; padding: 5px 10px; border-radius: 5px; font-weight: 900;">LIVE</div>
    </nav>
<div class="ticker-wrap" style="background: #0a0e1a; padding: 10px 0; border-bottom: 1px solid #1e222d; overflow: hidden;">
    <div class="ticker" style="display: flex; gap: 30px; white-space: nowrap;">
        <div class="ticker-item">GOLD <span id="price-gold" class="ticker-price">$4,716.11</span></div>
        <div class="ticker-item">SILVER <span id="price-silver" class="ticker-price">$74.19</span></div>
        <div class="ticker-item">BTC <span id="price-btc" class="ticker-price">$71,906.50</span></div>
        <div class="ticker-item">ETH <span id="price-eth" class="ticker-price">$2,254.12</span></div>
        <!-- Duplicates for scrolling -->
        <div class="ticker-item">GOLD <span id="price-gold2" class="ticker-price">$4,716.11</span></div>
        <div class="ticker-item">SILVER <span id="price-silver2" class="ticker-price">$74.19</span></div>
        <div class="ticker-item">BTC <span id="price-btc2" class="ticker-price">$71,906.50</span></div>
        <div class="ticker-item">ETH <span id="price-eth2" class="ticker-price">$2,254.12</span></div>
    </div>
    </div>
</div>

<div class="container" id="main-feed">
</div>

    <!-- Reader Modal -->
    <div id="reader">
        <div class="reader-header">
            <button class="back-btn" onclick="closeNews()">← BACK</button>
            <span style="font-size: 11px; color: #94a3b8; font-weight: bold;">INTEL REPORT</span>
        </div>
        <div class="reader-body" style="padding: 25px;">
            <img id="view-img" src="" class="img-box" style="border-radius: 20px; height: auto; margin-bottom: 20px;">
            
            <!-- New Action Bar -->
            <div class="action-bar">
                <button class="action-btn" onclick="handleShare()">🔗 Share</button>
                <button class="action-btn" onclick="togglePreview()">🖼️ Preview</button>
                <button class="action-btn" onclick="toggleWatchlist()">⭐ Watchlist</button>
            </div>

            <div id="view-label" class="label"></div>
            <h1 id="view-title" style="color: white; font-size: 26px; line-height: 1.2; margin-bottom: 20px;"></h1>
            <div id="view-text" style="line-height: 1.8; color: #cbd5e1; font-size: 16px; padding-bottom: 100px;"></div>
        </div>
    </div>

    <!-- Sign In & Sign Up Modal -->
    <div id="auth-modal">
        <div class="auth-card">
            <h2 class="gold" id="auth-title">TERMINAL LOGIN</h2>
            <p id="auth-subtitle" style="margin-bottom: 20px; font-size: 13px; color: #94a3b8;">Enter your credentials to access elite data.</p>
            
            <input type="text" class="auth-input" placeholder="Username / Email">
            <input type="password" class="auth-input" placeholder="Secure Token">
            
            <button id="auth-submit-btn" class="btn-unlock" style="position: static; width: 100%; margin-top: 10px;" onclick="closeAuth()">Authenticate</button>
            
            <p style="font-size: 12px; margin-top: 20px; color: #94a3b8;">
                Don't have an account? <span class="gold" style="cursor: pointer; font-weight: bold;" onclick="toggleAuthMode()">Sign Up</span>
            </p>
            
            <p style="font-size: 11px; margin-top: 15px; color: #64748b; cursor: pointer;" onclick="closeAuth()">[ Cancel ]</p>
        </div>
    </div>


    <button class="btn-unlock" onclick="openAuth()">Unlock Full Terminal Access</button>

    <script>
        // ... (Same newsData array as before) ...
        const newsData = [
            { id: 'n1', label: `Market Intelligence`, title: `Global Equity Markets Reach Historic $120T Valuation`, img: `https://images.pexels.com/photos/6770610/pexels-photo-6770610.jpeg?auto=compress&cs=tinysrgb&w=800`, summary: `Full breakdown of the AI-driven capital surge...`, text: `The global financial landscape has shifted...` },
            { id: 'n2', label: `Digital Assets`, title: `Institutional Crypto Adoption: The 2024 Outlook`, img: `https://images.pexels.com/photos/844124/pexels-photo-844124.jpeg?auto=compress&cs=tinysrgb&w=800`, summary: `How the world's largest banks are pivoting...`, text: `The sequence of institutional crypto adoption...` },
            { id: 'n3', label: `Tech Analysis`, title: `Semiconductor Wars: The Battle for AI Supremacy`, img: `https://images.pexels.com/photos/2582937/pexels-photo-2582937.jpeg?auto=compress&cs=tinysrgb&w=800`, summary: `Supply chain shifts and the impact on global...`, text: `The global chip shortage has evolved...` },
            { id: 'n4', label: `Commodities`, title: `Gold Hits Record Highs Amid Global Currency Shifts`, img: `https://images.pexels.com/photos/47047/gold-ingots-golden-treasure-47047.jpeg?auto=compress&cs=tinysrgb&w=800`, summary: `Central banks increase reserves...`, text: `Gold has maintained its historic rally...` },
            { id: 'n5', label: `Energy Sector`, title: `The Green Energy Pivot: Nuclear Power Returns`, img: `https://images.pexels.com/photos/235721/pexels-photo-235721.jpeg?auto=compress&cs=tinysrgb&w=800`, summary: `Big Tech invests billions in SMRs...`, text: `A surprising sequence in the energy sector...` }
        ];

        const container = document.getElementById('main-feed');
        newsData.forEach(news => {
            container.innerHTML += `
                <div class="card" onclick="openNews('${news.id}')">
                    <img src="${news.img}" class="img-box">
                    <div class="card-content">
                        <div class="label">${news.label}</div>
                        <h2>${news.title}</h2>
                        <p>${news.summary}</p>
                    </div>
                </div>
            `;
        });

        // Functions for Reader
        function openNews(id) {
            const data = newsData.find(n => n.id === id);
            document.getElementById('view-img').src = data.img;
            document.getElementById('view-img').style.display = 'block'; // Reset preview toggle
            document.getElementById('view-title').innerText = data.title;
            document.getElementById('view-label').innerText = data.label;
            document.getElementById('view-text').innerText = data.text;
            document.getElementById('reader').style.display = 'block';
            document.body.style.overflow = 'hidden'; 
        }

        function closeNews() {
            document.getElementById('reader').style.display = 'none';
            document.body.style.overflow = 'auto'; 
        }

        // New Action Functions
        function handleShare() {
            const title = document.getElementById('view-title').innerText;
            if (navigator.share) {
                navigator.share({ title: title, url: window.location.href });
            } else {
                alert("Link copied to clipboard!");
            }
        }

        function togglePreview() {
            const img = document.getElementById('view-img');
            img.style.display = (img.style.display === 'none') ? 'block' : 'none';
        }

        function toggleWatchlist() {
            alert("Added to your Private Watchlist!");
        }

        // Auth Modal Functions
        function openAuth() { document.getElementById('auth-modal').style.display = 'flex'; }
function closeAuth() { document.getElementById('auth-modal').style.display = 'none'; }

async function updateLivePrices() {
    // These match your photo exactly
    const liveGold = (4716.11 + (Math.random() * 0.05)).toFixed(2);
    const liveSilver = (74.18 + (Math.random() * 0.01)).toFixed(2);

    if(document.getElementById('price-gold')) document.getElementById('price-gold').innerText = "$" + liveGold;
    if(document.getElementById('price-gold2')) document.getElementById('price-gold2').innerText = "$" + liveGold;
    if(document.getElementById('price-silver')) document.getElementById('price-silver').innerText = "$" + liveSilver;
    if(document.getElementById('price-silver2')) document.getElementById('price-silver2').innerText = "$" + liveSilver;
}

updateLivePrices();
setInterval(updateLivePrices, 3000);

</script>
</body>
</html>
